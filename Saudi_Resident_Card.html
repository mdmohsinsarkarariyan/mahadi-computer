<style>

    :root {
            --primary-color: #00468b;
            --secondary-color: #25d366;
            --accent-color: #ff9800;
            --bg-light: #f4f7f6;
            --text-dark: #333;
      }

/* ===== BODY ===== */
body{
  margin:0;
  padding:20px;
  font-family: 'Noto Sans Bengali', 'Hind Siliguri', 'Segoe UI', sans-serif;
  background: var(--bg-light);
  color:#fff;
}

/* ===== HEADING ===== */
.heading{
  text-align:center;
  font-size:2.5rem;
  margin:2rem 0;
  border-bottom:1px solid rgba(255,255,255,0.2);
  padding-bottom:10px;
  color: var(--accent-color);
}

.heading span{
  color:var(--primary-color);
}

/* ===== GRID ===== */
.skills-section{
  max-width:1100px;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:25px;
}

/* ===== CARD ===== */
.skill-card{
  background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
  border-radius:18px;
  padding:22px;
  display:flex;
  align-items:center;
  gap:18px;
  position:relative;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.1);
  transition:all .4s ease;
  box-shadow:0 15px 35px rgba(0,0,0,0.5);
  text-decoration:none;
  color:white;
}

/* Gold Strip */
.skill-card::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:6px;
  background:var(--accent-color);
}

/* Watermark */
.skill-card::after{
  content:"SAUDI RESIDENT";
  position:absolute;
  right:-30px;
  bottom:-10px;
  font-size:40px;
  color:rgba(255,255,255,0.05);
  transform:rotate(-25deg);
  font-weight:bold;
}

/* Hover */
.skill-card:hover{
  transform:translateY(-10px) scale(1.03);
  box-shadow:0 25px 50px rgba(0,0,0,0.7);
}

/* ===== ICON ===== */
.skill-icon{
  width:75px;
  height:75px;
  border-radius:14px;
  background:linear-gradient(145deg,#ffffff,#e6e6e6);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  box-shadow:inset 0 3px 8px rgba(0,0,0,0.3);
}

.skill-icon img{
  width:45px;
  height:45px;
}

/* ===== TEXT ===== */
.skill-content h3{
  margin:0;
  color: var(--bg-light);
  font-size:1.1rem;
}

.skill-content p{
  margin:6px 0 0;
  font-size:.85rem;
  color:#e5e7eb;
}

/* Card Number */
.card-number{
  position:absolute;
  bottom:10px;
  left:22px;
  font-size:12px;
  letter-spacing:2px;
  color:rgba(255,255,255,0.6);
}

/* QR Style */
.qr-corner{
  position:absolute;
  right:15px;
  bottom:15px;
  width:35px;
  height:35px;
  background:
  repeating-linear-gradient(
    45deg,
    #fff,
    #fff 2px,
    #065f46 2px,
    #065f46 4px
  );
  border-radius:4px;
  opacity:0.6;
}

/* ===== BACK BUTTON ===== */
.button-container{
  text-align:center;
  margin-top:50px;
}

.btn{
  display:inline-block;
  padding:14px 35px;
  font-size:16px;
  font-weight:600;
  letter-spacing:1px;
  color: var(--bg-light);
  background:var(--accent-color);
  border:1px solid rgba(247,226,122,0.4);
  border-radius:12px;
  text-decoration:none;
  position:relative;
  overflow:hidden;
  transition:all .4s ease;
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

/* Gold Shine Effect */
.btn::before{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,0.4),transparent);
  transition:0.6s;
}

.btn:hover::before{
  left:100%;
}

/* Hover Effect */
.btn:hover{
  transform:translateY(-5px);
  box-shadow:0 20px 40px rgba(0,0,0,0.6);
  border-color:#f7e27a;
}

/* ===== MOBILE ===== */
@media(max-width:600px){
  .skill-card{
    flex-direction:column;
    text-align:center;
  }
}

.whatsapp-float {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 9999;
}

.whatsapp-float a {
  display: flex;
  align-items: center;
  gap: 8px;
  background: #25d366;
  color: white;
  padding: 12px 16px;
  border-radius: 50px;
  font-weight: bold;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  animation: bounce 2s infinite;
  transition: 0.3s;
  text-decoration: none;
}

.whatsapp-float a:hover {
  background: #1ebe5d;
  transform: scale(1.05);
}

.whatsapp-float i {
  font-size: 20px;
}

/* Bounce Animation */
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}


@media (max-width: 600px) {
  .whatsapp-float span {
    display: none;
  }
}

</style>

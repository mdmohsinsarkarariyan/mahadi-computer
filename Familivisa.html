<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Skills / Services</title>
  
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: linear-gradient(180deg,#071021 0%, #081426 60%); color:#e6eef6; -webkit-font-smoothing:antialiased;
      line-height:1.5;

    }

    /* Heading */
.heading {
  text-align: center;
  margin: 0 rem;
  font-size: 2.5rem;
  border-bottom: 0.1rem solid #fff4;
  color: #fff;
  
}
.heading span {
  color: #fbff00;
}
    .skills-section {
      max-width: 1100px;
      margin: auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }
    .skill-card {
      background:#0b1220;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(54, 37, 200, 0.1);
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 15px;
      opacity: 0;
      transform: translateY(40px);
      transition: all 0.8s ease;
    }
    .skill-card.show {
      opacity: 1;
      transform: translateY(0);
    }

    .skill-content h3 {
      margin: 0;
      font-size: 1.2rem;
      color: #ffffff;
    }


    .skill-link {
  text-decoration: none;
  color: inherit;
  display: block;
}











    /* মোবাইলের জন্য কাস্টম স্টাইল */
    @media (max-width: 600px) {
      .skill-card {
        flex-direction: column;
        text-align: center;
      }
      .skill-icon {
        margin-bottom: 10px;
      }
    }

.button-container {
  display: flex;
  justify-content: center;
  align-items: center;
  margin-top: 40px; /* skills এর নিচে একটু ফাঁকা রাখবে */
}

    
.btn{
  position:relative;
  padding:14px 28px;
  font-size:18px;
  font-family:sans-serif;
  color:#fff;
  background:linear-gradient(90deg,#06b6d4,#7c3aed);
  border:none;
  border-radius:10px;
  text-decoration:none;
  overflow:hidden;
  cursor:pointer;
  transition:transform 0.3s ease, box-shadow 0.3s ease;
}

  .btn span{
    display:block;
    font-size:14px;
    color:#d1d5db;
  }

  /* Hover effect */
  .btn:hover{
    transform:translateY(-5px) scale(1.03);
    box-shadow:0 12px 24px rgba(0,0,0,0.4);
  }

  /* Ripple animation */
  .btn::after{
    content:"";
    position:absolute;
    left:50%;
    top:50%;
    width:0;
    height:0;
    background:rgba(255,255,255,0.3);
    border-radius:50%;
    transform:translate(-50%,-50%);
    opacity:0;
    transition:width .5s ease, height .5s ease, opacity .5s ease;
  }
  .btn:active::after{
    width:200%;
    height:500%;
    opacity:0;
    transition:0s;
  }
  </style>
</head>
<body>
  <h1 class="heading"><span> Visa</span> Service</h1>
  <section class="skills-section">

      <a href="https://www.der3.com/en/home" class="skill-link">
        <div class="skill-card">        
          <div class="skill-content">
            <h3>Family Visa Insurance Payment</h3>
          </div>
        </div>
      </a>
      
         <a href="https://buy.saico.com.sa/VisitorExtendPolicy/app-visitor-extend-policy" class="skill-link">
        <div class="skill-card">        
          <div class="skill-content">
            <h3>Family Visa Insurance Payment</h3>
          </div>
        </div>
      </a>


          <a href="https://www.chi.gov.sa/en/ServicesDirectory/pages/eservices-checkinsurance.aspx?servicename=checkinsurance" class="skill-link">
        <div class="skill-card">        
          <div class="skill-content">
            <h3> All Check Insurance</h3>
          </div>
        </div>
      </a>
  </section>

    
<!-- এই অংশটা skills-section এর নিচে রাখুন -->
<div class="button-container">
  <a href="./visa.html" class="btn">⬅ Back to Home</a>
</div>



  <script>
    const cards = document.querySelectorAll('.skill-card');

    function showOnScroll() {
      const triggerBottom = window.innerHeight * 0.85;

      cards.forEach(card => {
        const cardTop = card.getBoundingClientRect().top;

        if (cardTop < triggerBottom) {
          card.classList.add('show');
        }
      });
    }

    window.addEventListener('scroll', showOnScroll);
    window.addEventListener('load', showOnScroll);
  </script>
</body>
</html>

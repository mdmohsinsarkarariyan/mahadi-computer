<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Skills / Services</title>
  
  <style>

     :root {
            --primary-color: #00468b;
            --secondary-color: #25d366;
            --accent-color: #ff9800;
            --bg-light: #f4f7f6;
            --text-dark: #333;
      }

    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: var(--bg-light);
      line-height:1.5;

    }

    /* Heading */
.heading {
  text-align: center;
  margin: 0 rem;
  font-size: 2.5rem;
  border-bottom: 0.1rem solid #fff4;
  color:var(--accent-color);
  
}
.heading span {
  color: var(--primary-color);
}
    .skills-section {
      max-width: 1100px;
      margin: auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }
    .skill-card {
      background:var(--primary-color);
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(54, 37, 200, 0.1);
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 15px;
      opacity: 0;
      transform: translateY(40px);
      transition: all 0.8s ease;
    }
    .skill-card.show {
      opacity: 1;
      transform: translateY(0);
    }
    .skill-icon {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.8rem;
      flex-shrink: 0;
      transition: transform 0.4s ease;
    }
    .skill-card:hover .skill-icon {
      transform: rotate(360deg) scale(1.2);
    }
    .skill-content h3 {
      margin: 0;
      font-size: 1.2rem;
      color: #ffffff;
    }
    .skill-content p {
      margin: 5px 0 0;
      color: var(--bg-light);
      font-size: 0.9rem;
    }

    .skill-link {
  text-decoration: none;
  color: inherit;
  display: block;
}

.skill-icon img {
  width: 60px;
  height: 60px;
  border-radius: 40%;
  background: linear-gradient(135deg, #6a11cb, #2575fc);
  padding: 8px;
  transition: transform 0.5s ease;
}

.skill-card:hover .work-icon img {
  transform: rotate(360deg) scale(1.1);
}








    /* মোবাইলের জন্য কাস্টম স্টাইল */
    @media (max-width: 600px) {
      .skill-card {
        flex-direction: column;
        text-align: center;
      }
      .skill-icon {
        margin-bottom: 10px;
      }
    }

.button-container {
  display: flex;
  justify-content: center;
  align-items: center;
  margin-top: 40px; /* skills এর নিচে একটু ফাঁকা রাখবে */
}

    
.btn{
  position:relative;
  padding:14px 28px;
  font-size:18px;
  font-family:sans-serif;
  color:#fff;
  background:var(--accent-color);
  border:none;
  border-radius:10px;
  text-decoration:none;
  overflow:hidden;
  cursor:pointer;
  transition:transform 0.3s ease, box-shadow 0.3s ease;
}

  .btn span{
    display:block;
    font-size:14px;
    color:#d1d5db;
  }

  /* Hover effect */
  .btn:hover{
    transform:translateY(-5px) scale(1.03);
    box-shadow:0 12px 24px rgba(0,0,0,0.4);
  }

  /* Ripple animation */
  .btn::after{
    content:"";
    position:absolute;
    left:50%;
    top:50%;
    width:0;
    height:0;
    background:rgba(255,255,255,0.3);
    border-radius:50%;
    transform:translate(-50%,-50%);
    opacity:0;
    transition:width .5s ease, height .5s ease, opacity .5s ease;
  }
  .btn:active::after{
    width:200%;
    height:500%;
    opacity:0;
    transition:0s;
  }
  </style>
</head>
<body>
  <h1 class="heading"><span> Visa</span> Service</h1>
  <section class="skills-section">

      <a href="./Familivisa.html" class="skill-link">
        <div class="skill-card">
          <div class="skill-icon">
            <img src="./images/wired-flat-2464-visa.svg" alt="Passport Icon">
          </div>
          <div class="skill-content">
            <h3>Family Visa Service</h3>
            <p> step-by-step instructions for a Family visa</p>
          </div>
        </div>
      </a>
      

         <a href="graphic-design.html" class="skill-link">
        <div class="skill-card">
          <div class="skill-icon">
            <img src="./images/wired-flat-2464-visa.svg" alt="Passport Icon">
          </div>
          <div class="skill-content">
            <h3>Tourist Visa Service</h3>
            <p> step-by-step instructions for a Tourist visa</p>
          </div>
        </div>
      </a>


         <a href="graphic-design.html" class="skill-link">
        <div class="skill-card">
          <div class="skill-icon">
            <img src="./images/wired-flat-2464-visa.svg" alt="Passport Icon">
          </div>
          <div class="skill-content">
            <h3>Visit Visa Service</h3>
            <p> step-by-step instructions for a visit visa</p>
          </div>
        </div>
      </a>
            


  </section>

    
<!-- এই অংশটা skills-section এর নিচে রাখুন -->
<div class="button-container">
<a href="./index.html" class="btn">⬅ Back to Home</a>
</div>



  <script>
    const cards = document.querySelectorAll('.skill-card');

    function showOnScroll() {
      const triggerBottom = window.innerHeight * 0.85;

      cards.forEach(card => {
        const cardTop = card.getBoundingClientRect().top;

        if (cardTop < triggerBottom) {
          card.classList.add('show');
        }
      });
    }

    window.addEventListener('scroll', showOnScroll);
    window.addEventListener('load', showOnScroll);
  </script>
</body>
</html>
